<header class="site-header">
  <div class="header-container">
    <a class="site-title" href="{{ '/' | relative_url }}">
      <span class="copilot-sparkle">{{ site.title }}</span>
    </a>

    <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>

    <nav class="site-nav">
      {% if site.active_lang == "pt-br" %}
      <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Início</a>
      <a href="{{ '/posts/' | relative_url }}" {% if page.url == '/posts/' %}class="active"{% endif %}>Publicações</a>
      {% else %}
      <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a>
      <a href="{{ '/posts/' | relative_url }}" {% if page.url == '/posts/' %}class="active"{% endif %}>Posts</a>
      {% endif %}

      <!-- Language Toggle Switch -->
      <div class="lang-toggle" aria-label="Toggle language">
        <span class="lang-label {% if site.active_lang == 'en' %}active{% endif %}">EN</span>
        <label class="toggle-switch">
          {% assign current_path = page.url | default: '/' %}
          {% if site.active_lang == "pt-br" %}
            {% assign target_url = current_path | remove_first: '/pt-br' %}
            {% if target_url == '' %}{% assign target_url = '/' %}{% endif %}
          {% else %}
            {% assign target_url = '/pt-br' | append: current_path %}
          {% endif %}
          <input type="checkbox" id="lang-switch" {% if site.active_lang == "pt-br" %}checked{% endif %} data-target="{{ target_url | relative_url }}">
          <span class="toggle-slider"></span>
        </label>
        <span class="lang-label {% if site.active_lang == 'pt-br' %}active{% endif %}">PT</span>
      </div>

    </nav>
  </div>
</header>
