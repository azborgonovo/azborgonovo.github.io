<!DOCTYPE html>
<html lang="{{ site.active_lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title | escape }} | {{ site.title | escape }}{% else %}{{ site.title | escape }}{% endif %}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}">
    {% feed_meta %}
    {% seo %}
  </head>
  <body>
    <div class="app-layout">
      <div class="app-panel" id="app-panel">
        {% include header.html %}
      </div>
      <div class="app-content">
        <main class="page-content">
          {{ content }}
        </main>
        {% include footer.html %}
      </div>
    </div>

    <script>
      // Mobile panel toggle — hamburger opens/closes left panel
      const menuToggle = document.querySelector('.menu-toggle');
      const appPanel = document.getElementById('app-panel');
      if (menuToggle && appPanel) {
        menuToggle.addEventListener('click', () => {
          const open = appPanel.classList.toggle('open');
          menuToggle.setAttribute('aria-expanded', open);
        });
      }

      // Close panel when clicking outside (mobile)
      document.addEventListener('click', (e) => {
        if (appPanel && !appPanel.contains(e.target) && !menuToggle?.contains(e.target)) {
          appPanel.classList.remove('open');
        }
      });

      // Language toggle switch
      const langSwitch = document.getElementById('lang-switch');
      if (langSwitch) {
        langSwitch.addEventListener('change', () => {
          window.location.href = langSwitch.dataset.target;
        });
      }
    </script>
  </body>
</html>
